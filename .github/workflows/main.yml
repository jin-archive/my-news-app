name: Update News RSS

on:
  schedule:
    - cron: '0 * * * *' # 매시간 0분에 자동 실행 (UTC 기준)
  workflow_dispatch: # Actions 탭에서 수동으로 버튼을 눌러 실행할 수 있는 옵션

permissions:
  contents: write # 봇이 news.json 파일을 커밋하고 푸시할 수 있는 권한 부여

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v3

      - name: 파이썬 환경 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: 필요 라이브러리 설치
        run: pip install feedparser

      - name: 뉴스 파싱 스크립트 실행
        run: python update_news.py

      - name: 변경된 JSON 파일 커밋 및 푸시
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add news.json
          # 파일 변경사항이 있을 때만 커밋 (에러 방지용)
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update news data"
          git push
